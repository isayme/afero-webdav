name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        go-version: [1.26]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version: '${{ matrix.go-version }}'

      - name: Run tests
        run: go test ./...
